title: CentOS kernel images (vmlinuz)

start_url: https://vault.centos.org/
download_folder: vmlinuz-centos
group: centos

jobs:
  - name: el6
    # el6 is stored under centos/ prefix, not at vault root
    start_url: https://vault.centos.org/centos/
    folder_patterns:
      - ^6\.
      - ^(os|updates)$
      - ^x86_64$
      - ^Packages$
    file_patterns:
      - ^kernel-[0-9].*\.x86_64\.rpm$

  - name: el7
    folder_patterns:
      - ^7\.[0-9]
      - ^(os|updates)$
      - ^x86_64$
      - ^Packages$
    file_patterns:
      # kernel-{ver}.x86_64.rpm contains vmlinuz for el7
      - ^kernel-[0-9].*\.x86_64\.rpm$

  - name: el8
    folder_patterns:
      - ^8\.[0-9]
      - ^BaseOS$
      - ^x86_64$
      - ^os$
      - ^Packages$
    file_patterns:
      # kernel-core contains vmlinuz for el8; exclude modules-core, debug-core, etc.
      - ^kernel-core-(?!6|7|8|9|debuginfo).*\.x86_64\.rpm$

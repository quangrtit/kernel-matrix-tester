title: Rocky Linux kernel images (vmlinuz)

start_url: https://dl.rockylinux.org/vault/rocky/
download_folder: vmlinuz-rocky
group: rocky

# kernel-core contains vmlinuz for Rocky 8 and 9
file_patterns:
  - ^kernel-core-(?!6|7|8|9|debuginfo).*\.x86_64\.rpm$

jobs:
  - name: rocky8-old
    # 8.3 / 8.4 — Packages/ directly (no k/ subfolder)
    folder_patterns:
      - ^8\.[0-4]
      - .*
      - ^x86_64$
      - ^os$
      - ^Packages$

  - name: rocky8-new
    # 8.5+ — Packages/k/ subfolder added
    folder_patterns:
      - ^8\.[5-9]
      - .*
      - ^x86_64$
      - ^os$
      - ^Packages$
      - ^k$

  - name: rocky9
    folder_patterns:
      - ^9\.
      - .*
      - ^x86_64$
      - ^os$
      - ^Packages$
      - ^k$

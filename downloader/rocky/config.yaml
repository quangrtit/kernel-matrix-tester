title: Rocky Linux kernel images
base_url: https://dl.rockylinux.org/vault/rocky/

skip_pattern: (debug|modules-core|devel|headers|tools|bpftool|cross|perf|abi)

# kernel-core contains vmlinuz for Rocky 8 and 9
file_pattern: ^kernel-core-[2-5]\.\d+\.\d+.*\.x86_64\.rpm$

jobs:
  - name: rocky8-old
    # 8.0–8.4: Packages/ directly, no k/ subfolder
    dir_patterns:
      - ^8\.[0-4]
      - .*
      - ^x86_64$
      - ^os$
      - ^Packages$

  - name: rocky8-new
    # 8.5+: Packages/k/ subfolder added
    dir_patterns:
      - ^8\.[5-9]
      - .*
      - ^x86_64$
      - ^os$
      - ^Packages$
      - ^k$

  - name: rocky9
    dir_patterns:
      - ^9\.
      - .*
      - ^x86_64$
      - ^os$
      - ^Packages$
      - ^k$
